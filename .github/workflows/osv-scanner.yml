name: OSV Scanner

# Scans for known vulnerabilities in dependencies using OSV (Open Source Vulnerabilities)
# https://google.github.io/osv-scanner/

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Run weekly on Monday at 10:00 UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:

# Minimal top-level permissions
permissions:
  contents: read

jobs:
  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --format=sarif
            --output=osv-results.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        if: always()
        with:
          sarif_file: osv-results.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: osv-scan-results
          path: osv-results.sarif
          retention-days: 5
